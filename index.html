<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>しんじゅの伝説RPG</title><style>body{font-family:sans-serif;background:#6ec6ff;text-align:center;margin:0}#game{max-width:900px;margin:auto;background:#fff;min-height:100vh;padding:20px}#scene{font-size:90px}#log{height:260px;overflow:auto;border:2px solid #999;padding:10px;text-align:left}button{width:260px;min-height:80px;font-size:28px;font-weight:bold;border-radius:15px;margin:10px}</style></head><body><div id='game'><h1>🌟しんじゅの伝説🌟</h1><div id='scene'>👧</div><div id='status'></div><div id='buttons'></div><div id='log'></div></div><script>let hp=60,maxHp=60,gold=0,lv=1;function s(){status.innerHTML='❤️'+hp+'/'+maxHp+' ⭐Lv.'+lv+' 💰'+gold}function log(t){logbox.innerHTML+=t+'<br>'}const logbox=document.getElementById('log');function village(){scene.innerHTML='🏡';buttons.innerHTML='<button onclick=forest()>🌲森</button><button onclick=save()>💾保存</button>';s()}function forest(){scene.innerHTML='🐺';log('🐺モンスターが現れた');buttons.innerHTML='<button onclick=battle()>⚔️こうげき</button>'}function battle(){gold+=10;log('🎉勝利');s();buttons.innerHTML='<button onclick=village()>🏡村</button>'}function save(){localStorage.setItem('shinju',JSON.stringify({hp,gold,lv}));log('💾保存した')}const d=localStorage.getItem('shinju');if(d){let x=JSON.parse(d);hp=x.hp;gold=x.gold;lv=x.lv;}village();</script></body></html>
