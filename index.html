<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>しんじゅの伝説DX</title><style>body{margin:0;background:#8ed1ff;font-family:sans-serif;text-align:center}#g{max-width:950px;margin:auto;background:#fff;min-height:100vh;padding:12px}#scene{font-size:90px}#st{background:#fff7c0;padding:8px}#log{height:260px;overflow:auto;text-align:left;border:1px solid #999;padding:8px}button{width:260px;min-height:70px;font-size:22px;margin:6px}</style></head><body><div id=g><h1>🌟しんじゅの伝説DX🌟</h1><div id=scene>👧</div><div id=st></div><div id=btn></div><div id=log></div></div><script>const loge=document.getElementById('log');let d=JSON.parse(localStorage.getItem('shinjuDX')||'null');let p=d?.p||{lv:1,hp:80,max:80,g:0,pot:3};let chapter=d?.chapter||1;let party=d?.party||['🐱ニャルン'];function save(){localStorage.setItem('shinjuDX',JSON.stringify({p,chapter,party}))}function log(t){loge.innerHTML+=t+'<br>';loge.scrollTop=99999;save()}function ui(){st.innerHTML='❤️'+p.hp+'/'+p.max+' ⭐'+p.lv+' 💰'+p.g+' 🧪'+p.pot+' 👥'+party.join(' ')}function map(){ui();scene.textContent='🗺️';btn.innerHTML='<button onclick=forest()>🌲森</button><button onclick=mountain()>⛰️山</button><button onclick=cave()>🌊洞くつ</button><button onclick=shop()>🏪店</button>'}function battle(icon,name,h,a,r,join,next){scene.textContent=icon;log('⚔️ '+name+' が現れた！');btn.innerHTML='<button onclick=atk()>⚔️攻撃</button>';window.atk=()=>{let dmg=party.length*8+p.lv*3;log('👥 仲間たちの攻撃！ '+dmg+'ダメージ');h-=dmg;if(h<=0){log('🎉 '+name+' をたおした！');p.g+=r;if(join&&!party.includes(join)){party.push(join);log('🎊 '+join+' が仲間になった！')}next();return}p.hp-=a;log(name+' の攻撃！ -'+a);ui();}};ui()}function forest(){battle('🐺','ウルファ',35,6,20,'🐶ワンコロ',()=>{chapter=2;map()})}function mountain(){battle('🦅','ホークン',55,9,35,'🦊フォクシー',()=>{chapter=3;map()})}function cave(){battle('🦀','クラブン',70,10,50,'🐧ペンタ',()=>{chapter=4;map()})}function shop(){scene.textContent='🏪';log('🛒お店へようこそ');}map();log('📖冒険スタート！');</script></body></html>
