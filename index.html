<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>しんじゅの伝説</title><style>body{margin:0;background:#7ec8ff;font-family:sans-serif;text-align:center}#g{max-width:900px;margin:auto;background:#fff;min-height:100vh;padding:15px}#s{background:#fff7c0;padding:10px;border-radius:10px}#log{height:260px;overflow:auto;border:1px solid #999;text-align:left;padding:10px}#scene{font-size:90px}button{width:260px;min-height:80px;font-size:24px;margin:8px;border-radius:12px}</style></head><body><div id=g><h1>🌟しんじゅの伝説🌟</h1><div id=scene>👧</div><div id=s></div><div id=b></div><div id=log></div></div><script>let p={lv:1,hp:60,max:60,g:0,pot:3};let chapter=1;const loge=document.getElementById('log');function log(t){loge.innerHTML+=t+'<br>';loge.scrollTop=99999}function ui(){s.innerHTML='❤️'+p.hp+'/'+p.max+' ⭐Lv.'+p.lv+' 💰'+p.g+' 🧪'+p.pot}function save(){localStorage.setItem('shinjuSave',JSON.stringify({p,chapter}));log('💾保存')}function load(){let d=localStorage.getItem('shinjuSave');if(d){let x=JSON.parse(d);p=x.p;chapter=x.chapter}}function village(){ui();scene.textContent='🏡';b.innerHTML='<button onclick=forest()>🌲森</button><button onclick=mountain()>⛰️山</button><button onclick=rest()>🏠休む</button><button onclick=save()>💾保存</button>'}function rest(){p.hp=p.max;ui();log('💤回復した')}function battle(name,hp,atk,reward,next){scene.textContent='⚔️';log(name+' が現れた');b.innerHTML='<button onclick="hit()">⚔️攻撃</button><button onclick="heal()">🧪回復</button>';window.heal=()=>{if(p.pot>0){p.pot--;p.hp=Math.min(p.max,p.hp+30);ui();}};window.hit=()=>{hp-=10+p.lv*3;if(hp<=0){p.g+=reward;p.lv+=0.2;ui();log('🎉勝利');next();return;}p.hp-=atk;if(p.hp<=0){p.hp=p.max;log('💫村へ戻った');village();return;}ui();};}function forest(){battle('🐺ウルファ',30,6,20,()=>{log('🌟森のかけらを入手');chapter=Math.max(chapter,2);village();});}function mountain(){if(chapter<2){log('まず森へ');return;}battle('🦅ホークン',45,8,30,()=>{log('🌟山のかけらを入手');chapter=3;b.innerHTML='<button onclick=castle()>🏰城へ</button>';});}function castle(){battle('👹城のまもの',70,10,50,()=>{log('🔑火山への道が開いた');chapter=4;b.innerHTML='<button onclick=volcano()>🌋火山へ</button>';});}function volcano(){battle('🐉黒りゅう',120,12,100,()=>{scene.textContent='👑';log('🏆クリア！世界に平和が戻った！');b.innerHTML='<button onclick="localStorage.removeItem(`shinjuSave`);location.reload()">🔄最初から</button>';});}load();village();if(chapter===1)log('👵しんじゅのかけらを集めよう！');</script></body></html>
