<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>しんじゅの伝説DX</title><style>body{margin:0;background:#8ed1ff;font-family:sans-serif;text-align:center}#g{max-width:950px;margin:auto;background:#fff;min-height:100vh;padding:12px}#scene{font-size:90px}#st{background:#fff7c0;padding:8px}#log{height:260px;overflow:auto;text-align:left;border:1px solid #999;padding:8px}button{width:260px;min-height:70px;font-size:22px;margin:6px}</style></head><body><div id=g><h1>🌟しんじゅの伝説DX🌟</h1><div id=scene>👧</div><div id=st></div><div id=btn></div><div id=log></div></div><script>let d=JSON.parse(localStorage.getItem('shinjuDX')||'null');let p=d?.p||{lv:1,hp:80,max:80,g:0,pot:3};let chapter=d?.chapter||1;let party=d?.party||['🐱ニャルン'];const L=log;function log(t){loge.innerHTML+=t+'<br>';loge.scrollTop=99999;save()}const loge=document.getElementById('log');function save(){localStorage.setItem('shinjuDX',JSON.stringify({p,chapter,party}))}function ui(){st.innerHTML='❤️'+p.hp+'/'+p.max+' ⭐'+p.lv+' 💰'+p.g+' 🧪'+p.pot+' 👥'+party.join(' ')}function map(){ui();scene.textContent='🗺️';btn.innerHTML='<button onclick=forest()>🌲森</button><button onclick=mountain()>⛰️山</button><button onclick=cave()>🌊洞くつ</button><button onclick=shop()>🏪店</button><button onclick=rest()>🏡休む</button>'+(chapter>=4?'<button onclick=castle()>🏰城</button>':'')+(chapter>=6?'<button onclick=volcano()>🌋火山</button>':'')}function rest(){p.hp=p.max;map()}function gain(){p.lv++;p.max+=10;p.hp=p.max}function battle(n,h,a,r,join,next){scene.textContent=n;btn.innerHTML='<button onclick=atk()>⚔️攻撃</button><button onclick=heal()>🧪回復</button>';window.heal=()=>{if(p.pot){p.pot--;p.hp=Math.min(p.max,p.hp+40);ui();save()}};window.atk=()=>{let dmg=party.length*8+p.lv*3;h-=dmg;if(h<=0){p.g+=r;if(Math.random()<0.7&&join&&!party.includes(join)){party.push(join);log('🎊'+join+'が仲間！')}if(p.lv<10)gain();next();save();return}p.hp-=a;if(p.hp<=0){p.hp=p.max;log('💫たおれた');map();return}ui()}}function forest(){chapter=Math.max(chapter,2);battle('🐺',35,6,20,'🐶ワンコロ',()=>{log('森クリア');map()})}function mountain(){if(chapter<2)return log('森へ行こう');chapter=Math.max(chapter,3);battle('🦅',55,9,35,'🦊フォクシー',()=>{log('山クリア');map()})}function cave(){if(chapter<3)return log('山へ行こう');chapter=4;battle('🦀',70,10,50,'🐧ペンタ',()=>{log('洞くつクリア 城が開放');map()})}function shop(){scene.textContent='🏪';btn.innerHTML='<button onclick=buy()>🧪20G</button><button onclick=evo()>✨進化50G</button><button onclick=map()>戻る</button>'}window.buy=()=>{if(p.g>=20){p.g-=20;p.pot++;ui();save()}};window.evo=()=>{if(p.g>=50){p.g-=50;p.lv+=2;log('✨進化！');ui();save()}};function castle(){chapter=6;battle('👹',120,14,80,'🦖ドラコ',()=>{log('🏆四天王を突破！火山へ');map()})}function volcano(){battle('🐉',220,18,200,'',()=>{scene.textContent='👑';btn.innerHTML='<button onclick=reset()>🔄最初から</button>';log('🎉エンディング！世界を救った！')})}window.reset=()=>{localStorage.removeItem('shinjuDX');location.reload()};map();if(chapter===1)log('📖しんじゅのかけらを集めよう');</script></body></html>
